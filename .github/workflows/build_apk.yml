name: Build Android APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Java (required by the Android build tools)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Scaffold platform folders and install our source
        run: |
          flutter create --project-name daily_todo --org com.example scaffold_tmp
          rm -rf scaffold_tmp/lib
          cp -r todo_app/lib scaffold_tmp/lib
          cp todo_app/pubspec.yaml scaffold_tmp/pubspec.yaml

      - name: Get packages
        working-directory: scaffold_tmp
        run: flutter pub get

      - name: Build release APK
        working-directory: scaffold_tmp
        run: flutter build apk --release

      - name: Upload APK as a downloadable artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-todo-app
          path: scaffold_tmp/build/app/outputs/flutter-apk/app-release.apk
